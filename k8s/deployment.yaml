apiVersion: apps/v1
kind: Deployment
metadata:
  name: housing-price-correction-risk
  labels:
    app: housing-price-correction-risk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: housing-price-correction-risk
  template:
    metadata:
      labels:
        app: housing-price-correction-risk
    spec:
      containers:
        - name: api
          image: housing-price-correction-risk:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
